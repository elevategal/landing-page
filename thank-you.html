    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #111122;
            --bg-card: #1a1a35;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --accent: #7C5CFC;
            --green: #22C55E;
            --border: rgba(255,255,255,0.08);
            --radius-lg: 20px;
        }
        body {
            font-family: 'Noto Sans Hebrew', -apple-system, sans-serif;
            background: var(--bg-primary);
            background-image:
                linear-gradient(rgba(124,92,252,0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,92,252,0.12) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .thank-you-page {
            max-width: 580px;
            width: 100%;
        }
        .check-circle {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: rgba(34,197,94,0.1);
            border: 3px solid var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 3rem;
            animation: pop-in 0.5s ease;
        }
        @keyframes pop-in {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 16px;
        }
        h1 .accent { color: var(--accent); }
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .next-steps {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            text-align: right;
            margin-bottom: 28px;
        }
        .next-steps h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .step-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }
        .step-item:last-child { margin-bottom: 0; }
        .step-num {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .step-item p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .wa-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: #fff;
            padding: 16px 36px;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(37,211,102,0.3);
        }
        .wa-btn { animation: wa-breathe 2.5s ease-in-out infinite; }
        @keyframes wa-breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(37,211,102,0.3); }
            50% { transform: scale(1.05); box-shadow: 0 8px 30px rgba(37,211,102,0.5); }
        }
        .wa-btn:hover { animation: none; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37,211,102,0.4); }
        .wa-btn svg { width: 22px; height: 22px; fill: #fff; }
        .wa-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 14px;
        }
        .back-link {
            display: block;
            margin-top: 28px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .back-link:hover { color: var(--accent); }
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; }
            .check-circle { width: 80px; height: 80px; font-size: 2.5rem; }
            .next-steps { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="thank-you-page">
        <div class="check-circle">&#10003;</div>
        <h1>הפרטים נשלחו <span class="accent">בהצלחה!</span></h1>
        <p class="subtitle">תודה שנרשמת. נחזור אליך תוך 24 שעות כדי לתאם שיחת התאמה קצרה.</p>

        <div class="next-steps">
            <h3>מה קורה עכשיו?</h3>
            <div class="step-item">
                <div class="step-num">1</div>
                <p>נבדוק את הפרטים שלך ונוודא שהסדנה מתאימה לך</p>
            </div>
            <div class="step-item">
                <div class="step-num">2</div>
                <p>ניצור איתך קשר תוך 24 שעות לשיחת התאמה קצרה</p>
            </div>
            <div class="step-item">
                <div class="step-num">3</div>
                <p>אם יש התאמה - נשריין לך מקום במחזור הקרוב</p>
            </div>
        </div>

        <a href="index.html" class="back-link">&rarr; חזרה לדף הראשי</a>
    </div>

    <script src="accessibility-widget.js"></script>
</body>
</html>
